<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan posiłków KP</title>

<style>

:root {
--bg:#f6f4ef;
--card:#ffffff;
--text:#222;
--muted:#6b6b6b;
--line:#e6e0d5;
--accent:#435b4d;
--accent-soft:#e8efe9;
--shadow:0 10px 28px rgba(34,34,34,0.08);
}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:linear-gradient(180deg,#fbfaf7 0%,var(--bg) 100%);
color:var(--text);
}

.app{
max-width:760px;
margin:auto;
padding:18px 14px 90px;
}

.hero{
background:linear-gradient(135deg,#435b4d 0%,#627967 100%);
color:white;
padding:18px;
border-radius:24px;
box-shadow:var(--shadow);
}

.hero h1{
margin:0 0 6px;
font-size:1.7rem;
}

.kpi-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:16px;
}

.kpi{
background:rgba(255,255,255,.12);
border-radius:16px;
padding:12px;
}

.progress{
height:8px;
background:rgba(255,255,255,.2);
border-radius:999px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
background:white;
width:0%;
}

.section{
margin-top:18px;
background:white;
border-radius:22px;
box-shadow:var(--shadow);
}

.section-head{
padding:16px;
}

.checklist{
padding:0 16px 16px;
display:grid;
gap:10px;
}

.check-item{
background:white;
border:1px solid var(--line);
border-radius:16px;
padding:13px;
}

.toolbar{
display:flex;
gap:10px;
overflow-x:auto;
padding:8px 16px;
}

.pill{
background:white;
border:1px solid var(--line);
border-radius:999px;
padding:8px 14px;
}

.pill.active{
background:var(--accent);
color:white;
}

.meal-grid{
display:grid;
gap:12px;
padding:0 16px 16px;
}

.meal-card{
background:white;
border:1px solid var(--line);
border-radius:18px;
padding:14px;
}

button{
border:0;
border-radius:12px;
padding:11px 13px;
cursor:pointer;
}

.qty-wrap{
display:inline-flex;
gap:6px;
background:#f7f3ec;
border-radius:12px;
padding:4px;
}

.qty{
min-width:28px;
text-align:center;
font-weight:700;
}

.selected-list{
display:grid;
gap:10px;
padding:0 16px 16px;
}

.selected-item{
background:white;
border:1px solid var(--line);
border-radius:16px;
padding:12px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="app">

<section class="hero">
<h1>Plan posiłków KP</h1>
<p>Zaplanuj dzień wokół 2200 kcal i 160 g białka.</p>

<div class="kpi-grid">

<div class="kpi">
<div>Kalorie</div>
<div><span id="caloriesValue">0</span> / 2200</div>
<div class="progress"><span id="caloriesBar"></span></div>
</div>

<div class="kpi">
<div>Białko</div>
<div><span id="proteinValue">0</span> g / 160 g</div>
<div class="progress"><span id="proteinBar"></span></div>
</div>

</div>
</section>


<section class="section">
<div class="section-head">
<h2>Cele dzienne</h2>
</div>

<div class="checklist">

<div class="check-item">
<label><input type="checkbox"> Osiągnięto cel kalorii (2200 kcal)</label>
</div>

<div class="check-item">
<label><input type="checkbox"> Osiągnięto cel białka (160 g)</label>
</div>

<div class="check-item">
<label><input type="checkbox"> 10 000 kroków</label>
</div>

<div class="check-item">
<label><input type="checkbox"> Wypite 2 litry wody</label>
</div>

</div>
</section>


<section class="section">
<div class="section-head">
<h2>Baza posiłków</h2>
</div>

<div class="toolbar" id="categoryTabs"></div>
<div class="meal-grid" id="mealGrid"></div>

</section>


<section class="section">
<div class="section-head">
<h2>Dzisiejszy plan</h2>
</div>

<div class="selected-list" id="selectedList"></div>

</section>


<section class="section">
<div class="section-head">
<h2>Sugestia uzupełnienia makro</h2>
<p id="macroSuggestion">Dodaj posiłki aby zobaczyć sugestię.</p>
</div>
</section>

</div>

<script>

const TARGETS={calories:2200,protein:160}

const MEALS=[
{category:"Breakfast",name:"Breakfast Bagel",calories:1020,protein:88},
{category:"Breakfast",name:"Breakfast Wrap",calories:940,protein:82},
{category:"Breakfast",name:"Overnight Oats",calories:430,protein:31},

{category:"Dinner",name:"Chicken Wraps",calories:700,protein:52},
{category:"Dinner",name:"Chicken Pasta Bake",calories:760,protein:66},
{category:"Dinner",name:"Spaghetti with Beef",calories:660,protein:43},
{category:"Dinner",name:"Chicken Curry with Rice",calories:710,protein:100},

{category:"Snack",name:"Cottage Cheese",calories:196,protein:22},
{category:"Snack",name:"Boiled Eggs",calories:140,protein:12},
{category:"Snack",name:"Protein Shake",calories:200,protein:30},
{category:"Snack",name:"Protein Pudding",calories:150,protein:20}
]

let selected={}

function updateTotals(){

let cals=0
let protein=0

Object.keys(selected).forEach(name=>{
let meal=MEALS.find(m=>m.name===name)
cals+=meal.calories*selected[name]
protein+=meal.protein*selected[name]
})

document.getElementById("caloriesValue").innerText=Math.round(cals)
document.getElementById("proteinValue").innerText=Math.round(protein)

document.getElementById("caloriesBar").style.width=Math.min((cals/TARGETS.calories)*100,100)+"%"
document.getElementById("proteinBar").style.width=Math.min((protein/TARGETS.protein)*100,100)+"%"

updateSuggestion(cals,protein)

}

function updateSuggestion(cals,protein){

let calLeft=TARGETS.calories-cals
let proteinLeft=TARGETS.protein-protein

let text=""

if(calLeft<=0 && proteinLeft<=0)
text="Świetnie! Osiągnięto dzienny cel."

else if(proteinLeft>15)
text="Brakuje białka – dobrym wyborem będzie pudding proteinowy."

else if(calLeft>150)
text="Możesz dodać małą przekąskę."

else
text="Jesteś bardzo blisko celu."

document.getElementById("macroSuggestion").innerText=text

}

function renderMeals(){

const grid=document.getElementById("mealGrid")
grid.innerHTML=""

MEALS.forEach(meal=>{

let qty=selected[meal.name]||0

let card=document.createElement("div")
card.className="meal-card"

card.innerHTML=`
<strong>${meal.name}</strong>
<div>${meal.calories} kcal • ${meal.protein} g białka</div>

<div class="qty-wrap">
<button onclick="changeMeal('${meal.name}',-1)">−</button>
<div class="qty">${qty}</div>
<button onclick="changeMeal('${meal.name}',1)">+</button>
</div>
`

grid.appendChild(card)

})

}

function changeMeal(name,delta){

let next=(selected[name]||0)+delta

if(next<=0) delete selected[name]
else selected[name]=next

renderMeals()
updateTotals()

}

renderMeals()
updateTotals()

</script>

</body>
</html>
